  title:
    ca: Esdeveniments
  description:
    ca: >-
      Organitzem i col·laborem en propostes que apropen les persones als cims,
      les planes i els corriols del Berguedà.
schools:
  title:
    ca: Escoles
  description:
    ca: >-
      Transmetem els valors de l'esport i el respecte a la muntanya als infants
      i joves de la comarca.
members:
  title:
    ca: Fes-te MRB
  description:
    ca: Fes-te soci o sòcia i forma part de Mountain Runners del Berguedà.
community:
  title:
    ca: Muntanya, territori, comunitat
  description:
    ca: >-
      Compartim la muntanya amb esforç, constància, compromís i respecte per la
      natura.
