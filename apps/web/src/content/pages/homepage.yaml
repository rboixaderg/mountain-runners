id: homepage
published: true
hero:
  title:
    ca: Mountain Runners del Berguedà
  description:
    ca: >-
      Portem més de 15 anys creixent i treballant sobre un eix en comú, la
      muntanya, sempre amb els valors de l'esforç, la constància, el compromís,
      el treball en equip i el respecte a la natura.
